[build]
  command = "npm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/notify"
  to = "/.netlify/functions/notify"
  status = 200

[[redirects]]
  from = "/api/hire-notify"
  to = "/.netlify/functions/hire-notify"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
